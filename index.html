<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;
    font-family: Arial;
    flex-direction: column;
}

/* الدائرة */
.circle {
    width: 250px;
    height: 250px;
    background: pink;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* الزر */
button {
    padding: 12px 25px;
    border: none;
    background: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
}

/* المحتوى */
#content {
    display: none;
    margin-top: 20px;
    text-align: center;
}

img {
    width: 220px;
    max-width: 90%;
    border-radius: 15px;
}

h2 {
    color: #ff4081;
}
</style>

</head>

<body>

<div class="circle">
    <button onclick="showContent()">اضغط هنا 💖</button>
</div>

<div id="content">
    <!-- حط اسم صورتك هنا -->
    <img src="photo.jpg" alt="person">
    <h2>حبيتو ❤️</h2>
</div>

<script>
function showContent() {
    document.getElementById("content").style.display = "block";
}
</script>

</body>
</html>
